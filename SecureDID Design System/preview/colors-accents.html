<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-surface-0); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .card { border: 1px solid var(--border-subtle); border-radius: 8px; overflow: hidden; }
  .sw { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font: 600 12px var(--font-sans); color: var(--fg-1); }
  .hex { font: 500 10px var(--font-mono); color: var(--fg-3); margin-top: 2px; }
  .app { font: 500 10px var(--font-sans); color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
</style></head><body>
  <div class="grid">
    <div class="card"><div class="sw" style="background:#4f46e5"></div><div class="meta"><div class="name">Indigo</div><div class="hex">#4f46e5</div><div class="app">Factory · Panelist</div></div></div>
    <div class="card"><div class="sw" style="background:#059669"></div><div class="meta"><div class="name">Emerald</div><div class="hex">#059669</div><div class="app">Student</div></div></div>
    <div class="card"><div class="sw" style="background:#7c3aed"></div><div class="meta"><div class="name">Violet</div><div class="hex">#7c3aed</div><div class="app">University</div></div></div>
    <div class="card"><div class="sw" style="background:#ea580c"></div><div class="meta"><div class="name">Orange</div><div class="hex">#ea580c</div><div class="app">College</div></div></div>
    <div class="card"><div class="sw" style="background:#0284c7"></div><div class="meta"><div class="name">Sky</div><div class="hex">#0284c7</div><div class="app">Explorer</div></div></div>
    <div class="card"><div class="sw" style="background:#0f172a"></div><div class="meta"><div class="name">Slate 900</div><div class="hex">#0f172a</div><div class="app">Inverse / Dark</div></div></div>
  </div>
</body></html>
