<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface-0); }
  .row { display: flex; align-items: baseline; gap: 20px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .label { width: 120px; flex-shrink: 0; font-size: 11px; color: var(--fg-3); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  code { color: var(--fg-1); font-size: 14px; }
</style></head><body>
  <div class="row"><div class="label">Wallet address</div><code>0x8Afb3b…D21c</code></div>
  <div class="row"><div class="label">Tx hash</div><code>0xa1b2c3d4e5f6…89ab</code></div>
  <div class="row"><div class="label">DID</div><code>did:securedid:mit-cs:0x8Afb…D21c</code></div>
  <div class="row"><div class="label">CID</div><code>bafybeihkoviema…7q3m</code></div>
  <div class="label t-meta" style="margin-top:8px;">JetBrains Mono · only for addresses, hashes, CIDs and tx IDs. Never body.</div>
</body></html>
