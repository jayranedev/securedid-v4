<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-surface-0); }
  .row { display: flex; align-items: center; gap: 16px; padding: 4px 0; }
  .bar { background: var(--accent-100); height: 24px; border-radius: 4px; }
  .tag { font: 600 11px var(--font-mono); color: var(--fg-3); width: 80px; }
  .val { font: 500 11px var(--font-sans); color: var(--fg-3); width: 44px; text-align: right; }
  :root { --accent: #4f46e5; --accent-100: #e0e7ff; }
</style></head><body>
  <div class="row"><div class="tag">--space-1</div><div class="bar" style="width:4px;"></div><div class="val">4</div></div>
  <div class="row"><div class="tag">--space-2</div><div class="bar" style="width:8px;"></div><div class="val">8</div></div>
  <div class="row"><div class="tag">--space-3</div><div class="bar" style="width:12px;"></div><div class="val">12</div></div>
  <div class="row"><div class="tag">--space-4</div><div class="bar" style="width:16px;"></div><div class="val">16</div></div>
  <div class="row"><div class="tag">--space-5</div><div class="bar" style="width:20px;"></div><div class="val">20</div></div>
  <div class="row"><div class="tag">--space-6</div><div class="bar" style="width:24px;"></div><div class="val">24</div></div>
  <div class="row"><div class="tag">--space-8</div><div class="bar" style="width:32px;"></div><div class="val">32</div></div>
  <div class="row"><div class="tag">--space-10</div><div class="bar" style="width:40px;"></div><div class="val">40</div></div>
  <div class="row"><div class="tag">--space-14</div><div class="bar" style="width:56px;"></div><div class="val">56</div></div>
  <div class="row"><div class="tag">--space-18</div><div class="bar" style="width:72px;"></div><div class="val">72</div></div>
</body></html>
