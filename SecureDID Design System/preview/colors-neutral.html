<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-surface-0); }
  .scale { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; }
  .sw { aspect-ratio: 1; border-radius: 6px; border: 1px solid var(--border-subtle); display:flex; align-items:flex-end; padding: 4px; font: 600 9px var(--font-mono); }
  .dark { color: white; } .light { color: var(--slate-700); }
  .label { font: 600 11px var(--font-sans); color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 12px; }
</style></head><body>
  <div class="label">Slate (neutrals)</div>
  <div class="scale">
    <div class="sw light" style="background:#fff">0</div>
    <div class="sw light" style="background:#f8fafc">50</div>
    <div class="sw light" style="background:#f1f5f9">100</div>
    <div class="sw light" style="background:#e8edf3">150</div>
    <div class="sw light" style="background:#e2e8f0">200</div>
    <div class="sw light" style="background:#cbd5e1">300</div>
    <div class="sw light" style="background:#94a3b8">400</div>
    <div class="sw dark" style="background:#64748b">500</div>
    <div class="sw dark" style="background:#475569">600</div>
    <div class="sw dark" style="background:#334155">700</div>
    <div class="sw dark" style="background:#1e293b">800</div>
    <div class="sw dark" style="background:#0f172a">900</div>
    <div class="sw dark" style="background:#020617">950</div>
  </div>
</body></html>
