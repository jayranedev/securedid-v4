<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface-0); display: flex; gap: 32px; align-items: flex-end; }
  .item { text-align: center; }
  .sw { width: 72px; height: 72px; background: var(--slate-100); border: 1px solid var(--border-default); }
  .name { font: 600 11px var(--font-mono); color: var(--fg-1); margin-top: 8px; }
  .val { font: 500 11px var(--font-sans); color: var(--fg-3); margin-top: 2px; }
</style></head><body>
  <div class="item"><div class="sw" style="border-radius: 4px;"></div><div class="name">xs</div><div class="val">4px</div></div>
  <div class="item"><div class="sw" style="border-radius: 6px;"></div><div class="name">sm</div><div class="val">6px · buttons</div></div>
  <div class="item"><div class="sw" style="border-radius: 8px;"></div><div class="name">md</div><div class="val">8px</div></div>
  <div class="item"><div class="sw" style="border-radius: 12px;"></div><div class="name">lg</div><div class="val">12px · cards</div></div>
  <div class="item"><div class="sw" style="border-radius: 20px;"></div><div class="name">xl</div><div class="val">20px · DID card</div></div>
  <div class="item"><div class="sw" style="border-radius: 999px;"></div><div class="name">full</div><div class="val">pills · avatars</div></div>
</body></html>
