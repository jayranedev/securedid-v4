<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface-0); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 10px; border-radius: 999px; font: 600 10.5px var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .active { background: #d1fae5; color: #047857; }
  .active .dot { background: #059669; }
  .executed { background: #f1f5f9; color: #475569; }
  .executed .dot { background: #64748b; }
  .expired { background: #fef3c7; color: #b45309; }
  .expired .dot { background: #d97706; }
  .revoked { background: #fee2e2; color: #b91c1c; }
  .revoked .dot { background: #dc2626; }
  .pending { background: #e0e7ff; color: #4338ca; }
  .pending .dot { background: #4f46e5; }
  .type-enroll { background: #ecfdf5; color: #047857; }
  .type-revoke { background: #fef2f2; color: #b91c1c; }
  .type-replace { background: #eef2ff; color: #4338ca; }
</style></head><body>
  <span class="pill active"><span class="dot"></span>Active</span>
  <span class="pill executed"><span class="dot"></span>Executed</span>
  <span class="pill expired"><span class="dot"></span>Expired</span>
  <span class="pill revoked"><span class="dot"></span>Revoked</span>
  <span class="pill pending"><span class="dot"></span>Pending</span>
  <span style="width:100%; height:0;"></span>
  <span class="pill type-enroll">Enrollment</span>
  <span class="pill type-revoke">Revocation</span>
  <span class="pill type-replace">Replace panelist</span>
</body></html>
