<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface-0); display: flex; gap: 32px; align-items: center; }
  .block { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
  .lbl { font: 600 11px var(--font-sans); color: var(--fg-3); letter-spacing: 0.08em; text-transform: uppercase; }
  .mark { width: 56px; height: 56px; color: var(--slate-800); }
  .wordmark { color: var(--slate-900); }
  .dark { background: var(--slate-900); color: white; padding: 14px; border-radius: 10px; }
  .dark .mark, .dark .wordmark { color: white; }
  .app-row { display: flex; gap: 10px; align-items: center; }
  .app-chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px; background: white; border: 1px solid var(--border-subtle); font: 600 11px var(--font-sans); }
  .app-chip .sq { width: 10px; height: 10px; border-radius: 3px; }
</style></head><body>
  <div class="block">
    <div class="lbl">Mark</div>
    <div class="mark"><svg viewBox="0 0 32 32" fill="none"><path d="M16 2.5 L27 6.2 V15.5 C27 22.4 22.3 27.6 16 29.5 C9.7 27.6 5 22.4 5 15.5 V6.2 L16 2.5 Z" fill="currentColor" fill-opacity="0.08" stroke="currentColor" stroke-width="1.6"/><rect x="10.5" y="12.5" width="6.5" height="5" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/><rect x="15" y="14.5" width="6.5" height="5" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/></svg></div>
  </div>
  <div class="block">
    <div class="lbl">Wordmark</div>
    <div class="wordmark" style="font:700 22px var(--font-sans); letter-spacing:-0.02em;">Secure<span style="opacity:0.55;">DID</span></div>
    <div class="dark"><span class="wordmark" style="font:700 16px var(--font-sans); letter-spacing:-0.02em;">Secure<span style="opacity:0.6;">DID</span></span></div>
  </div>
  <div class="block">
    <div class="lbl">Per-app tag</div>
    <div class="app-row">
      <span class="app-chip"><span class="sq" style="background:#4f46e5"></span>Factory</span>
      <span class="app-chip"><span class="sq" style="background:#059669"></span>Student</span>
      <span class="app-chip"><span class="sq" style="background:#7c3aed"></span>University</span>
    </div>
    <div class="app-row">
      <span class="app-chip"><span class="sq" style="background:#ea580c"></span>College</span>
      <span class="app-chip"><span class="sq" style="background:#0284c7"></span>Explorer</span>
    </div>
  </div>
</body></html>
