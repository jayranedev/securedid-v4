<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-surface-0); display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 10px; border-radius: 999px; background: var(--slate-100); border: 1px solid var(--border-subtle); font: 500 13px var(--font-mono); color: var(--fg-1); }
  .you { background: #ecfdf5; border-color: #a7f3d0; color: #047857; }
  .icon { width: 14px; height: 14px; color: var(--fg-3); opacity: 0.7; }
  .chain { display: inline-flex; align-items: center; height: 28px; padding: 0 10px 0 8px; border-radius: 999px; background: #e0f2fe; color: #075985; font: 600 11px var(--font-sans); gap: 6px; }
  .chain-dot { width: 6px; height: 6px; border-radius: 50%; background: #0284c7; }
  .label { font: 500 11px var(--font-sans); color: var(--fg-3); margin-right: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
</style></head><body>
  <span class="pill">0x8Afb3b…D21c<span class="icon">⎘</span></span>
  <span class="pill you">0x8Afb3b…D21c · YOU</span>
  <span class="pill">did:securedid:mit-cs:0x8A…D21c</span>
  <span style="width:100%; height:0;"></span>
  <span class="label">Chain pill</span>
  <span class="chain"><span class="chain-dot"></span>Base Sepolia</span>
  <span class="chain" style="background:#fef3c7;color:#b45309;"><span class="chain-dot" style="background:#d97706;"></span>Wrong network</span>
</body></html>
